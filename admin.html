<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espace Administrateur</title>
    <style>
        body {
            background-color: #ffffff;
            color: #000000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .admin-container {
            width: 100%;
            max-width: 360px;
            padding: 40px;
            border: 1px solid #000000;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 30px;
            font-size: 22px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #000000;
            background-color: #ffffff;
            color: #000000;
            box-sizing: border-box;
            font-size: 16px;
        }

        .input-group input:focus {
            outline: none;
            background-color: #f5f5f5;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #000000;
            color: #ffffff;
            border: 1px solid #000000;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            cursor: pointer;
            transition: background-color 0.2s, color 0.2s;
        }

        button:hover {
            background-color: #ffffff;
            color: #000000;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <h2>Espace Admin</h2>
        <form id="adminForm">
            <div class="input-group">
                <label for="lastName">Nom</label>
                <input type="text" id="lastName" required autocomplete="family-name">
            </div>
            <div class="input-group">
                <label for="firstName">Prénom</label>
                <input type="text" id="firstName" required autocomplete="given-name">
            </div>
            <div class="input-group">
                <label for="adminEmail">Adresse email</label>
                <input type="email" id="adminEmail" required autocomplete="email">
            </div>
            <div class="input-group">
                <label for="tempPassword">Mot de passe temporaire</label>
                <input type="password" id="tempPassword" required autocomplete="new-password">
            </div>
            <button type="submit">Valider</button>
        </form>
    </div>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // Configuration Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyAeQmIo2EEQNSvuBt54obS-qrRxn35WaT8",
        authDomain: "operating-system-ea358.firebaseapp.com",
        projectId: "operating-system-ea358",
        storageBucket: "operating-system-ea358.firebasestorage.app",
        messagingSenderId: "896027329219",
        appId: "1:896027329219:web:59d7ef893c8ee61c10d876",
        measurementId: "G-8KRMJJF1C8"
    };

    // Instance principale (si vous y connectez un compte admin plus tard)
    const app = initializeApp(firebaseConfig);

    // Instance secondaire isolée pour créer l'utilisateur
    const secondaryApp = initializeApp(firebaseConfig, "Secondary");
    const authSecondary = getAuth(secondaryApp);
    const dbSecondary = getFirestore(secondaryApp); // 💡 Lié à l'instance secondaire

    document.getElementById('adminForm').addEventListener('submit', async function(event) {
        event.preventDefault();
        
        const lastName = document.getElementById('lastName').value;
        const firstName = document.getElementById('firstName').value;
        const email = document.getElementById('adminEmail').value;
        const tempPassword = document.getElementById('tempPassword').value;

        try {
            // 1. Création du compte dans Firebase Authentication
            const userCredential = await createUserWithEmailAndPassword(authSecondary, email, tempPassword);
            const newUser = userCredential.user;

            // 2. Sauvegarde dans Firestore via dbSecondary (pour l'authentification soit reconnue)
            await setDoc(doc(dbSecondary, "users", newUser.uid), {
                lastName: lastName,
                firstName: firstName,
                email: email,
                role: "employee",
                createdAt: new Date().toISOString()
            });

            // 3. Déconnexion de l'instance secondaire
            await signOut(authSecondary);

            alert(`L'employé ${firstName} ${lastName} a été créé avec succès !`);
            document.getElementById('adminForm').reset();

        } catch (error) {
            console.error("Erreur lors de la création :", error);
            alert("Erreur : " + error.message);
        }
    });
</script>
</body>
</html>
